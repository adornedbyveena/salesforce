<template>
    <header class="slds-modal__header">
        <h2 class="slds-text-heading_medium">Adorned by Veena: Contract Wizard</h2>
    </header>

    <div class="slds-modal__content slds-p-around_medium" style="min-height: 550px; position: relative;">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Processing..." size="medium"></lightning-spinner>
        </template>

        <!-- STEP 1: Edit Form -->
        <template if:true={isStep1}>
            <div class="slds-text-title_caps slds-m-bottom_small slds-text-color_weak">1. Confirm Event &amp; Client Details</div>
            <div class="slds-grid slds-gutters">
                <div class="slds-col slds-size_1-of-2">
                    <lightning-record-edit-form record-id={recordId} object-api-name="Opportunity" data-id="oppForm" onsuccess={handleOppSuccess} onerror={handleFormError}>
                        <div class="slds-box slds-theme_shade">
                            <lightning-input-field field-name="Name" required></lightning-input-field>
                            <lightning-input-field field-name="CloseDate" required></lightning-input-field>
                            <lightning-input-field field-name="Total_Amount__c" required></lightning-input-field>
                            <lightning-input-field field-name="Deposit__c"></lightning-input-field>
                            <lightning-input-field field-name="Balance_Due__c"></lightning-input-field>
                            <lightning-input-field field-name="Deposit_Paid__c"></lightning-input-field>
                        </div>
                    </lightning-record-edit-form>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <template if:true={accountId}>
                        <lightning-record-edit-form record-id={accountId} object-api-name="Account" data-id="accForm" onsuccess={handleAccSuccess} onerror={handleFormError}>
                            <div class="slds-box slds-theme_shade">
                                <lightning-input-field field-name="Name" required></lightning-input-field>
                                <lightning-input-field field-name="PersonEmail" required></lightning-input-field>
                                <lightning-input-field field-name="Phone" required></lightning-input-field>
                                <lightning-input-field field-name="BillingStreet"></lightning-input-field>
                                <lightning-input-field field-name="BillingCity"></lightning-input-field>
                                <lightning-input-field field-name="BillingState"></lightning-input-field>
                                <lightning-input-field field-name="BillingPostalCode"></lightning-input-field>
                            </div>
                        </lightning-record-edit-form>
                    </template>
                </div>
            </div>
        </template>

        <!-- STEP 2: PDF Preview -->
        <template if:true={isStep2}>
            <div class="slds-text-title_caps slds-m-bottom_small slds-text-color_weak">2. Review Contract PDF</div>
            <div class="slds-box slds-theme_shade slds-text-align_center slds-m-top_large slds-p-around_xx-large">
                <lightning-icon icon-name="doctype:pdf" size="large"></lightning-icon>
                <h3 class="slds-text-heading_medium slds-m-top_medium">Contract Generated</h3>
                <p class="slds-m-bottom_large slds-text-color_weak">Review the formal agreement before sending it to the client.</p>
                <a href={pdfUrl} target="_blank" rel="noopener noreferrer" style="text-decoration: none;">
                    <button class="slds-button slds-button_outline-brand slds-p-horizontal_medium slds-p-vertical_x-small">
                        <lightning-icon icon-name="utility:preview" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        View PDF in New Tab
                    </button>
                </a>
            </div>
        </template>

        <!-- STEP 3: Email Compose Preview -->
        <template if:true={isStep3}>
            <div class="slds-text-title_caps slds-m-bottom_small slds-text-color_weak">3. Preview &amp; Send Email</div>

            <!-- Gmail-style compose window -->
            <div style="border:1px solid #ccc; border-radius:8px; overflow:hidden; max-width:640px; margin:0 auto; box-shadow:0 4px 16px rgba(0,0,0,0.15);">

                <!-- Compose header -->
                <div style="background:#404040; padding:10px 16px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="color:#fff; font-size:14px; font-weight:500;">New Message</span>
                    <lightning-icon icon-name="utility:minimize_window" size="x-small" style="--sds-c-icon-color-foreground-default:#fff;"></lightning-icon>
                </div>

                <!-- Fields -->
                <div style="background:#fff; border-bottom:1px solid #e0e0e0; padding:0 12px;">
                    <div style="display:flex; align-items:center; padding:8px 0; border-bottom:1px solid #e0e0e0;">
                        <span style="color:#666; font-size:13px; width:60px; flex-shrink:0;">From</span>
                        <span style="font-size:13px; color:#222;">Adorned by Veena &lt;adornedbyveena@gmail.com&gt;</span>
                    </div>
                    <div style="display:flex; align-items:center; padding:8px 0; border-bottom:1px solid #e0e0e0;">
                        <span style="color:#666; font-size:13px; width:60px; flex-shrink:0;">To</span>
                        <span style="font-size:13px; color:#222; background:#e8f0fe; border-radius:16px; padding:2px 10px;">{emailTo}</span>
                    </div>
                    <div style="display:flex; align-items:center; padding:8px 0;">
                        <span style="color:#666; font-size:13px; width:60px; flex-shrink:0;">Subject</span>
                        <span style="font-size:13px; color:#222;">{emailSubject}</span>
                    </div>
                </div>

                <!-- Email body preview -->
                <div style="background:#fff; padding:16px 16px 8px 16px; font-family:Arial,sans-serif; font-size:13px; color:#222; min-height:220px; line-height:1.6;">
                    <p>Dear {emailClientName},</p>
                    <p>Your Event Planning &amp; D&eacute;cor Contract for <strong>{emailEventName}</strong> is ready for your review and signature.</p>
                    <p>Please click the button below to view and sign your contract:</p>
                    <p style="margin:20px 0;">
                        <span style="background:#D4AF37; color:#fff; padding:10px 24px; font-weight:bold; font-size:14px; border-radius:4px;">Review &amp; Sign Contract</span>
                    </p>
                    <p>If you have any questions please contact us at <span style="color:#1a73e8;">veena@adornedbyveena.com</span>.</p>
                    <p>Warm regards,<br/><strong>Veena Boppana</strong><br/>Principal Designer, Adorned By Veena</p>
                </div>

                <!-- Attachment -->
                <div style="background:#fff; padding:8px 16px 12px; border-top:1px solid #e0e0e0;">
                    <div style="display:inline-flex; align-items:center; background:#f1f3f4; border-radius:4px; padding:6px 10px; gap:6px;">
                        <lightning-icon icon-name="doctype:pdf" size="x-small"></lightning-icon>
                        <span style="font-size:12px; color:#444;">{pdfFileName}</span>
                    </div>
                </div>

                <!-- Compose footer -->
                <div style="background:#fff; padding:10px 16px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid #e0e0e0;">
                    <lightning-button
                        variant="brand"
                        label="Send"
                        icon-name="utility:send"
                        icon-position="left"
                        onclick={saveAndSend}>
                    </lightning-button>
                    <lightning-icon icon-name="utility:delete" size="small" style="cursor:pointer; color:#666;" onclick={closeAction}></lightning-icon>
                </div>
            </div>
        </template>
    </div>

    <footer class="slds-modal__footer slds-grid slds-grid_align-spread">
        <div>
            <lightning-button label="Cancel" onclick={closeAction} if:true={isStep1}></lightning-button>
            <lightning-button label="Back"   onclick={goBack}      if:true={isStep2}></lightning-button>
            <lightning-button label="Back"   onclick={goBack}      if:true={isStep3}></lightning-button>
        </div>
        <div>
            <template if:true={isStep1}>
                <lightning-button label="Next: Generate Contract" variant="brand" onclick={saveStep1}></lightning-button>
            </template>
            <template if:true={isStep2}>
                <lightning-button label="Next: Preview Email" variant="brand" onclick={previewEmail}></lightning-button>
            </template>
        </div>
    </footer>
</template>
